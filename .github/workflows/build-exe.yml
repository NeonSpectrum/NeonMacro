name: Build Windows EXE

on:
  push:
    branches: ["main", "master"]
    tags: ["v*", "*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_name: gui
            output_filename: NeonFtool.exe
            artifact_name: neonftool-exe
            console_mode: disable
          - build_name: debug
            output_filename: NeonFtool-debug.exe
            artifact_name: neonftool-debug-exe
            console_mode: force
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Cache Nuitka artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka\Cache
            ~\.cache\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install nuitka ordered-set zstandard

      - name: Build executable with Nuitka (${{ matrix.build_name }})
        shell: pwsh
        run: |
          $iconPath = "assets\icons\logo.ico"
          if (!(Test-Path $iconPath)) {
            $ctkIconPath = python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__file__).resolve().parent / 'assets' / 'icons' / 'CustomTkinter_icon_Windows.ico')"
            $ctkIconPath = $ctkIconPath.Trim()
            if (Test-Path $ctkIconPath) {
              $iconPath = $ctkIconPath
            } else {
              $iconPath = $null
            }
          }
          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          $launcherPath = "build\nuitka_entry.py"
          @(
            "from neonftool.app import main",
            "",
            "if __name__ == '__main__':",
            "    main()"
          ) | Set-Content -Path $launcherPath -Encoding UTF8

          $commonArgs = @(
            "--onefile",
            "--standalone",
            "--assume-yes-for-downloads",
            "--enable-plugin=tk-inter",
            "--output-dir=build\dist"
          )

          # Prefer project icon, fallback to CustomTkinter icon.
          if ($iconPath -and (Test-Path $iconPath)) {
            $commonArgs += "--windows-icon-from-ico=$iconPath"
          }

          $buildArgs = @(
            "--windows-console-mode=${{ matrix.console_mode }}",
            "--output-filename=${{ matrix.output_filename }}"
          ) + $commonArgs + @($launcherPath)
          python -m nuitka @buildArgs

      - name: Verify built executable exists (${{ matrix.build_name }})
        shell: pwsh
        run: |
          if (!(Test-Path "build\dist\${{ matrix.output_filename }}")) {
            throw "Expected build\dist\${{ matrix.output_filename }} to exist, but it was not found."
          }

      - name: Upload artifact (${{ matrix.build_name }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/dist/${{ matrix.output_filename }}

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: neonftool-exe
          path: build/dist

      - name: Download debug artifact
        uses: actions/download-artifact@v4
        with:
          name: neonftool-debug-exe
          path: build/dist

      - name: Publish pre-release from main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          target_commitish: ${{ github.sha }}
          name: NeonFtool Pre-release (main)
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            build/dist/NeonFtool.exe
            build/dist/NeonFtool-debug.exe

      - name: Publish release from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeonFtool ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            build/dist/NeonFtool.exe
            build/dist/NeonFtool-debug.exe
