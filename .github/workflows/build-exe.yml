name: Build Windows EXE

on:
  push:
    branches: ["main", "master"]
    tags: ["v*", "*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Poetry and virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pypoetry\Cache
            .venv
          key: ${{ runner.os }}-py311-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-py311-poetry-

      - name: Cache Nuitka artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\Nuitka\Nuitka\Cache
            ~\.cache\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('pyproject.toml', 'src/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          python -m poetry --version
          python -m poetry install --with dev --no-interaction

      - name: Build executable with Nuitka
        shell: pwsh
        run: |
          $iconPath = "assets\icons\logo.ico"
          if (!(Test-Path $iconPath)) {
            $ctkIconPath = python -m poetry run python -c "import customtkinter, pathlib; print(pathlib.Path(customtkinter.__file__).resolve().parent / 'assets' / 'icons' / 'CustomTkinter_icon_Windows.ico')"
            $ctkIconPath = $ctkIconPath.Trim()
            if (Test-Path $ctkIconPath) {
              $iconPath = $ctkIconPath
            } else {
              $iconPath = $null
            }
          }
          New-Item -ItemType Directory -Force -Path "build" | Out-Null
          $launcherPath = "build\nuitka_entry.py"
          @(
            "from neonftool.app import main",
            "",
            "if __name__ == '__main__':",
            "    main()"
          ) | Set-Content -Path $launcherPath -Encoding UTF8

          $commonArgs = @(
            "--onefile",
            "--standalone",
            "--assume-yes-for-downloads",
            "--enable-plugin=tk-inter",
            "--include-package=neonftool",
            "--output-dir=build\dist"
          )

          # Prefer project icon, fallback to CustomTkinter icon.
          if ($iconPath -and (Test-Path $iconPath)) {
            $commonArgs += "--windows-icon-from-ico=$iconPath"
            # Bundle the runtime window icon so Tk can set titlebar/taskbar icon.
            $commonArgs += "--include-data-files=$iconPath=neonftool/assets/icons/logo.ico"
          }

          $buildArgs = @(
            "--output-filename=NeonFtool.exe"
          ) + $commonArgs + @($launcherPath)
          python -m poetry run python -m nuitka @buildArgs

      - name: Verify built executable exists
        shell: pwsh
        run: |
          if (!(Test-Path "build\dist\NeonFtool.exe")) {
            throw "Expected build\dist\NeonFtool.exe to exist, but it was not found."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neonftool-exe
          path: build/dist/NeonFtool.exe

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: neonftool-exe
          path: build/dist

      - name: Publish pre-release from main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-ci
          target_commitish: ${{ github.sha }}
          name: NeonFtool Pre-release (main)
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Automated pre-release build from `main`.
            Includes the latest GUI executable.
          files: |
            build/dist/NeonFtool.exe

      - name: Publish release from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeonFtool ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            build/dist/NeonFtool.exe
