name: Build Windows EXE

on:
  push:
    branches: ["main", "master"]
    tags: ["v*", "*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
      SCCACHE_DIR: ${{ github.workspace }}\.nuitka-cache\sccache
      SCCACHE_CACHE_SIZE: 2G
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache Poetry and virtualenv
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pypoetry\Cache
            .venv
          key: ${{ runner.os }}-py314-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-py314-poetry-

      - name: Cache Nuitka artifacts
        uses: actions/cache@v4
        with:
          path: |
            .nuitka-cache
          key: ${{ runner.os }}-nuitka-py314-${{ hashFiles('poetry.lock', '.github/workflows/build-exe.yml') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-py314-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          python -m poetry --version
          python -m poetry install --with dev --no-interaction

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Route cl.exe through sccache
        shell: pwsh
        run: |
          $sccache = (where.exe sccache 2>$null | Select-Object -First 1)
          if (-not $sccache) {
            throw "sccache was not found on PATH after setup action."
          }
          $wrapperDir = Join-Path $env:RUNNER_TEMP "sccache-msvc-wrapper"
          New-Item -ItemType Directory -Path $wrapperDir -Force | Out-Null
          Copy-Item $sccache (Join-Path $wrapperDir "cl.exe") -Force
          Add-Content -Path $env:GITHUB_PATH -Value $wrapperDir
          Write-Host "Added cl.exe wrapper directory to PATH: $wrapperDir"

      - name: Show sccache stats (before build)
        shell: pwsh
        run: |
          Write-Host "SCCACHE_DIR: $env:SCCACHE_DIR"
          New-Item -ItemType Directory -Path "$env:SCCACHE_DIR" -Force | Out-Null
          sccache --stop-server | Out-Null
          sccache --start-server
          sccache --zero-stats
          sccache --show-stats

      - name: Build executable with Nuitka
        shell: pwsh
        run: |
          python -m poetry run build

      - name: Show sccache stats (after build)
        shell: pwsh
        run: |
          sccache --show-stats

      - name: Verify built executable exists
        shell: pwsh
        run: |
          if (!(Test-Path "build\dist\NeonMacro.exe")) {
            throw "Expected build\dist\NeonMacro.exe to exist, but it was not found."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neonmacro-exe
          path: build/dist/NeonMacro.exe

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: neonmacro-exe
          path: build/dist

      - name: Publish pre-release from main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-ci
          target_commitish: ${{ github.sha }}
          name: Pre-release (main)
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body: |
            Automated pre-release build from `main`.
            Includes the latest GUI executable.
          files: |
            build/dist/NeonMacro.exe

      - name: Publish release from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NeonMacro ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: |
            build/dist/NeonMacro.exe
