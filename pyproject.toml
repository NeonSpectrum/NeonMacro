[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "neonftool"
version = "0.1.0"
description = "CustomTkinter NeonFtool key spammer using PostMessage."
requires-python = ">=3.11"
dependencies = [
    "customtkinter>=5.2.2",
    "keyboard>=0.13.5",
    "psutil>=5.9.8",
    "pywin32>=306",
]

[project.scripts]
neonftool = "neonftool.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
